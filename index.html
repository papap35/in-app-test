<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In-App Browser 導流測試</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .btn { display: inline-block; padding: 10px 20px; background: #007bff; color: white; border-radius: 5px; text-decoration: none; margin: 10px; }
        #log { background: #f4f4f4; padding: 10px; border-radius: 5px; word-break: break-all; text-align: left;}
    </style>
</head>
<body>

    <h2>⏱️ 倒數計時測試</h2>
    <h1 id="timer">剩餘秒數: 10 秒</h1>
    <p id="status">正在初始化...</p>

    <hr>

    <h3>🛠️ 實驗步驟（驗證不共用）：</h3>
    <ol style="text-align: left;">
        <li>在 <b>LINE/FB 內</b>打開此網頁，觀察秒數是否持續減少（驗證可儲存）。</li>
        <li>在秒數變成 5 秒時，點選右上角<b>「使用 Safari/Chrome 開啟」</b>。</li>
        <li>觀察新開的瀏覽器是否<b>「變回 10 秒重新倒數」</b>（驗證資料不共用）。</li>
    </ol>

    <div id="log"><b>User Agent:</b> <br></div>

    <script>
        // 顯示目前的 User Agent 方便判斷環境
        document.getElementById('log').innerHTML += navigator.userAgent;

        // 初始化秒數：如果 LocalStorage 有紀錄就用舊的，沒有就從 10 開始
        let targetKey = 'redirect_countdown';
        let seconds = localStorage.getItem(targetKey) ? parseInt(localStorage.getItem(targetKey)) : 10;
        
        const timerEl = document.getElementById('timer');
        const statusEl = document.getElementById('status');

        statusEl.innerText = "成功讀取 LocalStorage！目前剩餘: " + seconds + " 秒";

        const interval = setInterval(() => {
            seconds--;
            timerEl.innerText = `剩餘秒數: ${seconds} 秒`;
            localStorage.setItem(targetKey, seconds); // 寫入 LocalStorage

            if (seconds <= 0) {
                clearInterval(interval);
                timerEl.innerText = "💥 觸發強制轉導！";
                localStorage.removeItem(targetKey); // 轉導後清除
                // 這裡可以寫 window.location.href = '你的App下載連結';
            }
        }, 1000);
    </script>
</body>
</html>
