<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播間【第二頁】測試</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background-color: #fff0f5; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { display: inline-block; padding: 12px 24px; background: #dc3545; color: white; border-radius: 5px; text-decoration: none; font-weight: bold; margin-top: 10px; }
        .storage-box { text-align: left; background: #eef2f7; padding: 15px; border-radius: 5px; font-family: monospace; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📺 直播間 ID: <span style="color: #dc3545;">page-2</span></h2>
        <hr>
        <h3>⏱️ 本頁計時器</h3>
        <h1 id="timer">LocalStorage: 10 秒 | Session: 10 秒</h1>
        <p id="status">正在讀取儲存狀態...</p>
    </div>

    <div class="card">
        <h3>🔄 跨頁跳轉測試</h3>
        <p>點擊下方按鈕返回【第一頁】，驗證剛剛第一頁的秒數有沒有被好好記住。</p>
        <a href="index.html" class="btn">👈 返回第一頁 (page-1)</a>
    </div>

    <div class="storage-box">
        <b>目前環境數據：</b><br>
        <span id="ua-log"></span>
    </div>

    <script>
        const PAGE_ID = 'page-2';
        document.getElementById('ua-log').innerText = navigator.userAgent;

        // 設定獨立的 Key
        const localKey = `local_countdown_${PAGE_ID}`;
        const sessionKey = `session_countdown_${PAGE_ID}`;

        // 初始化秒數
        let localSec = localStorage.getItem(localKey) ? parseInt(localStorage.getItem(localKey)) : 10;
        let sessionSec = sessionStorage.getItem(sessionKey) ? parseInt(sessionStorage.getItem(sessionKey)) : 10;

        const timerEl = document.getElementById('timer');
        const statusEl = document.getElementById('status');

        statusEl.innerText = "成功獨立紀錄！";

        const interval = setInterval(() => {
            localSec--;
            sessionSec--;
            
            timerEl.innerText = `Local: ${localSec}s | Session: ${sessionSec}s`;

            localStorage.setItem(localKey, localSec);
            sessionStorage.setItem(sessionKey, sessionSec);

            if (localSec <= 0 && sessionSec <= 0) {
                clearInterval(interval);
                timerEl.innerText = "💥 倒數結束！";
                localStorage.removeItem(localKey);
                sessionStorage.removeItem(sessionKey);
            }
        }, 1000);
    </script>
</body>
</html>
